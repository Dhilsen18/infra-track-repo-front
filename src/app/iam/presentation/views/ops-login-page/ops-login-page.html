<app-auth-split-shell
  heroEyebrowKey="login.opsHeroEyebrow"
  heroTitleKey="login.opsHeroTitle"
  heroDescKey="login.opsHeroDesc"
>
  <div class="auth-panel">
    <button
      type="button"
      class="auth-back"
      (click)="back()"
      [attr.aria-label]="'login.backToEntitySelect' | translate"
    >
      <span class="material-icons-outlined">arrow_back</span>
    </button>

    <div class="auth-card">
      <header class="auth-header auth-header--center">
        <img class="auth-logo" src="/imagenes/logo_infratrack-sinfondo.png" alt="InfraTrack" />
        <p class="auth-brand-name">Infra<span class="auth-brand-accent">Track</span></p>
        <span class="auth-entity-badge">{{ 'login.entityAdminBadge' | translate }}</span>
        <h1>{{ 'login.signInHeading' | translate }}</h1>
        <p>{{ 'login.opsLoginSubtitle' | translate }}</p>
      </header>

      @if (errorMessage(); as err) {
        <p class="auth-error" role="alert">{{ err | translate }}</p>
      }

      <form class="auth-form" (ngSubmit)="submit()">
        <div class="auth-field-group">
          <label class="auth-label" for="ops-email">{{ 'login.email' | translate }}</label>
          <input
            id="ops-email"
            class="auth-input"
            type="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            name="email"
            [placeholder]="'login.emailPlaceholder' | translate"
            autocomplete="email"
          />
        </div>

        <div class="auth-field-group">
          <label class="auth-label" for="ops-password">{{ 'login.password' | translate }}</label>
          <div class="auth-input-wrap">
            <input
              id="ops-password"
              class="auth-input"
              [type]="hidePassword() ? 'password' : 'text'"
              [ngModel]="password()"
              (ngModelChange)="password.set($event)"
              name="password"
              [placeholder]="'login.passwordPlaceholder' | translate"
              autocomplete="current-password"
            />
            <button type="button" class="auth-toggle-password" (click)="togglePassword()">
              <span class="material-icons-outlined">{{
                hidePassword() ? 'visibility' : 'visibility_off'
              }}</span>
            </button>
          </div>
        </div>

        <div class="auth-field-group">
          <label class="auth-label" for="ops-company-code">{{ 'login.companyCode' | translate }}</label>
          <input
            id="ops-company-code"
            class="auth-input"
            [ngModel]="companyCode()"
            (ngModelChange)="companyCode.set($event)"
            name="companyCode"
            [placeholder]="'login.companyCodePlaceholder' | translate"
            autocomplete="off"
          />
        </div>

        <button
          class="auth-submit"
          [class.auth-submit--loading]="store.authBusy()"
          type="submit"
          [disabled]="store.authBusy()"
        >
          {{ 'login.submit' | translate }}
        </button>
      </form>

      <p class="auth-footer-link">
        {{ 'login.noAccountOps' | translate }}
        <a routerLink="/iam/ops/signup">{{ 'login.opsRegisterLink' | translate }}</a>
      </p>
    </div>
  </div>
</app-auth-split-shell>
